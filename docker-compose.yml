version: "3.8"

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - backend


  backend:
    build:
      context: ../backend
    ports:
      - "5000:5000"
    env_file:
      - ../backend/.env
    depends_on:
      - db
    
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=reviewflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
