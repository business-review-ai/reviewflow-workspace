version: "3.8"

services:
  frontend:
    container_name: frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: always
    # Ports are commented out because Nginx is in the same docker network
    # and can access the frontend at http://frontend:80 directly.
    # ports:
    #   - "3000:80"
    environment:
      - NODE_ENV=production
    networks:
      - default
    depends_on:
      - backend

  admin:
    container_name: admin
    build:
      context: ../admin
      dockerfile: Dockerfile
    restart: always
    # Ports are commented out for security. Nginx accesses at http://admin:80
    # ports:
    #   - "3001:80"
    environment:
      - NODE_ENV=production
    networks:
      - default
    depends_on:
      - backend

  backend:
    container_name: backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    # Ports are commented out. Nginx accesses at http://backend:5000
    # ports:
    #   - "5000:5000"
    env_file:
      - ../backend/.env.prod
    environment:
      - NODE_ENV=production
      - PORT=5000
    networks:
      - default

networks:
  default:
    name: local-docker-net
    external: true
