version: "3.8"

services:
  frontend:
    container_name: reviewflow-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=staging
    networks:
      - local-docker-net
    depends_on:
      - backend

  admin:
    container_name: reviewflow-admin
    build:
      context: ../admin
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=staging
    networks:
      - local-docker-net
    depends_on:
      - backend

  backend:
    container_name: reviewflow-backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=staging
      - PORT=5000
    networks:
      - local-docker-net
    depends_on:
      - db

  db:
    container_name: reviewflow-db
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=reviewflow
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - local-docker-net

volumes:
  postgres_staging_data:

networks:
  local-docker-net:
    name: local-docker-net
    driver: bridge
