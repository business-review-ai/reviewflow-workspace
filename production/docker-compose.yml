version: "3.8"

services:
  frontend:
    container_name: reviewflow-frontend
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
    networks:
      - default
    depends_on:
      - backend

  admin:
    container_name: reviewflow-admin
    build:
      context: ../../admin
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
    networks:
      - default
    depends_on:
      - backend

  backend:
    container_name: reviewflow-backend
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
    networks:
      - default

networks:
  default:
    name: local-docker-net
    external: true
